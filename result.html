// 4文字タイプコードからグループ情報・画像パスを補完する
for (const id of Object.keys(TYPES)) {
  const lead = id[0];
  const g = GROUPS[lead];
  TYPES[id].group = lead;
  TYPES[id].color = g.color;
  TYPES[id].bg = g.bg;
  TYPES[id].groupLabel = g.label;
  TYPES[id].image = `img/${id}.png`;
}

const ALL_TYPES_ORDER = Object.keys(TYPES);

const TRAIT_LABELS = {
  E: 'E・ときめき',
  F: 'F・理解会話',
  A: 'A・献身',
  S: 'S・安心信頼',
};

const STORAGE_RESULT = 'aiknow_amatrica_result';

// ── COMPATIBILITY（4文字の並び替えから動的に算出）──────────
function swapLetters(id, i, j) {
  const a = id.split('');
  [a[i], a[j]] = [a[j], a[i]];
  return a.join('');
}
function getBestMatches(typeId) {
  const swap12 = swapLetters(typeId, 0, 1);
  const swap34 = swapLetters(typeId, 2, 3);
  return [...new Set([swap12, swap34])].filter(id => id !== typeId);
}
function getCareMatches(typeId) {
  const reversed = typeId.split('').reverse().join('');
  return [reversed];
}

// ── INIT ──────────────────────────────────────────────────────
function init() {
  const params = new URLSearchParams(window.location.search);
  const typeParam = params.get('type');

  let typeId = typeParam;
  let traits = null;

  // ?type=XXX が指定されていない場合のみ localStorage を参照
  if (!typeParam) {
    try {
      const saved = localStorage.getItem(STORAGE_RESULT);
      if (saved) {
        const data = JSON.parse(saved);
        typeId = data.typeId;
        traits = data.traits || null;
      }
    } catch (e) {}
  } else {
    // デモ用 URL param 指定時は自分のスコアも参照（あれば）
    try {
      const saved = localStorage.getItem(STORAGE_RESULT);
      if (saved) {
        const data = JSON.parse(saved);
        traits = data.traits || null;
      }
    } catch (e) {}
  }

  if (!typeId || !TYPES[typeId]) {
    document.getElementById('resultHero').hidden = true;
    document.getElementById('resultContent').hidden = true;
    document.getElementById('notFound').hidden = false;
    return;
  }

  renderResult(typeId, traits);
}

// ── RENDER ────────────────────────────────────────────────────
function renderResult(typeId, traits) {
  const t = TYPES[typeId];

  // Apply type colors
  document.documentElement.style.setProperty('--type-color', t.color);
  document.documentElement.style.setProperty('--type-bg', t.bg);

  // Update meta tags dynamically（直接アクセス・ブラウザ拡張のSEOチェッカー対策）
  // ※ X/LINE等のクローラーはJSを実行しないため、シェア時の正確なOGPは
  //   share/{typeId}.html（静的生成）が担う。ここでの更新は直接訪問時の表示用。
  const fullTitle = `「${t.name}」でした | アマトリカ診断`;
  const longDescription = `アマトリカ診断で「${t.name}（${typeId}）」と判定されました。${t.catch} ${t.traits.slice(0, 60)}…`;
  const shareImageUrl = `${BASE_URL}/img/${typeId}.png`;
  const shareUrl = `${BASE_URL}/share/${typeId}.html`;
  const selfUrl = `${BASE_URL}/result.html?type=${typeId}`;

  document.title = fullTitle;
  document.querySelector('meta[name="description"]').content = longDescription;
  document.getElementById('canonicalLink').href = selfUrl;
  document.getElementById('ogTitle').content = fullTitle;
  document.getElementById('ogDescription').content = longDescription;
  document.getElementById('ogImage').content = shareImageUrl;
  document.getElementById('ogUrl').content = shareUrl;
  document.getElementById('twitterTitle').content = fullTitle;
  document.getElementById('twitterDescription').content = longDescription;
  document.getElementById('twitterImage').content = shareImageUrl;
  document.getElementById('twitterImageAlt').content = `アマトリカ診断のキャラクター「${t.name}」のイラスト`;

  // Hero（ファーストビューにキャラクター画像を表示）
  document.getElementById('typeEyebrow').textContent = t.groupLabel;
  document.getElementById('typeIconWrap').innerHTML =
    `<img src="${t.image}" alt="${t.name}のキャラクター画像" loading="eager">`;
  document.getElementById('typeCode').textContent = typeId;
  document.getElementById('typeName').textContent = t.name;
  document.getElementById('typeSubtitle').textContent = t.catch;

  document.getElementById('typeBadges').innerHTML =
    typeId.split('').map(letter =>
      `<span class="badge badge-ll" style="background:${GROUPS[letter].bg};color:${GROUPS[letter].color}">${TRAIT_LABELS[letter]}</span>`
    ).join('');

  // Traits
  document.getElementById('traitText').textContent = t.traits;

  // Love pattern
  document.getElementById('strengthText').textContent = t.strength;
  document.getElementById('pitfallText').textContent = t.pitfall;

  // Score bars
  renderScoreBars(traits, typeId);

  // Compatibility
  renderCompatibility(typeId);

  // Advice
  document.getElementById('adviceText').textContent = t.advice;

  // Other types
  renderOtherTypes(typeId);
}

function renderScoreBars(traits, typeId) {
  const container = document.getElementById('scoreBars');
  container.innerHTML = '';

  const letters = ['E', 'F', 'A', 'S'];
  const topLetter = typeId[0];

  for (const letter of letters) {
    const pct = traits ? Math.round(traits[letter] * 100) : 50;
    const isHighlight = letter === topLetter;

    const row = document.createElement('div');
    row.className = 'score-row';
    row.setAttribute('role', 'meter');
    row.setAttribute('aria-label', `${TRAIT_LABELS[letter]}: ${pct}%`);
    row.setAttribute('aria-valuenow', pct);
    row.setAttribute('aria-valuemin', 0);
    row.setAttribute('aria-valuemax', 100);
    row.innerHTML = `
      <span class="score-label">${TRAIT_LABELS[letter]}</span>
      <div class="score-bar-bg">
        <div class="score-bar-fill${isHighlight ? ' highlight' : ''}" style="width:0%" data-pct="${pct}"></div>
      </div>
      <span class="score-pct">${traits ? pct + '%' : '—'}</span>
    `;
    container.appendChild(row);
  }

  // Animate bars after render
  requestAnimationFrame(() => {
    container.querySelectorAll('.score-bar-fill').forEach(bar => {
      bar.style.width = bar.dataset.pct + '%';
    });
  });
}

function renderCompatibility(typeId) {
  const grid = document.getElementById('compatGrid');
  const bestMatch = getBestMatches(typeId);
  const careMatch = getCareMatches(typeId);

  const chip = id => TYPES[id]
    ? `<a href="result.html?type=${id}" class="compat-chip">
        <img class="compat-chip-thumb" src="${TYPES[id].image}" alt="" loading="lazy">
        ${TYPES[id].name}（${id}）
      </a>`
    : '';

  grid.innerHTML = `
    <div class="compat-card compat-good">
      <div class="compat-label">✅ 相性が良いタイプ</div>
      <div class="compat-types">${bestMatch.map(chip).join('')}</div>
    </div>
    <div class="compat-card compat-care">
      <div class="compat-label">⚠️ 注意が必要なタイプ</div>
      <div class="compat-types">${careMatch.map(chip).join('')}</div>
    </div>
  `;
}

function renderOtherTypes(currentId) {
  const grid = document.getElementById('otherTypesGrid');
  grid.innerHTML = '';
  grid.className = '';

  for (const lead of ['E', 'F', 'A', 'S']) {
    const groupWrap = document.createElement('div');
    groupWrap.className = 'other-group';
    groupWrap.innerHTML = `<div class="other-group-label" style="color:${GROUPS[lead].color}">${lead}始まり — ${GROUPS[lead].traitName}</div>`;

    const groupGrid = document.createElement('div');
    groupGrid.className = 'other-types-grid';

    for (const id of ALL_TYPES_ORDER.filter(id => id[0] === lead)) {
      const t2 = TYPES[id];
      const isCurrent = id === currentId;
      const a = document.createElement('a');
      a.href = isCurrent ? '#' : `result.html?type=${id}`;
      a.className = 'other-type-link' + (isCurrent ? ' current' : '');
      a.setAttribute('aria-label', `${t2.name}${isCurrent ? '（あなたのタイプ）' : 'の結果を見る'}`);
      if (isCurrent) a.setAttribute('aria-current', 'page');
      a.innerHTML = `
        <img class="other-type-thumb" src="${t2.image}" alt="" loading="lazy">
        <div class="other-type-info">
          <div class="other-type-badge">${id}</div>
          <div class="other-type-name">${t2.name}</div>
        </div>
      `;
      groupGrid.appendChild(a);
    }

    groupWrap.appendChild(groupGrid);
    grid.appendChild(groupWrap);
  }
}

// ── SHARE ─────────────────────────────────────────────────────
// X/LINE 等のクローラーはJSを実行せずOGPタグだけを読むため、
// タイプ別に静的生成した share/{typeId}.html を共有URLとして使う。
// これにより、シェアされたURLをXで開いた際にキャラクター画像が
// URLカード（Twitter Card）として正しく表示される。
const BASE_URL = 'https://tanitanistudio.github.io/amatrica-diagnosis';

function getCurrentTypeId() {
  const params = new URLSearchParams(window.location.search);
  return params.get('type') || (() => {
    try { return JSON.parse(localStorage.getItem(STORAGE_RESULT) || '{}').typeId; } catch (e) { return ''; }
  })();
}

function getShareUrl() {
  const typeId = getCurrentTypeId();
  return `${BASE_URL}/share/${typeId}.html`;
}

function getShareText() {
  const typeId = getCurrentTypeId();
  const t = TYPES[typeId] || {};
  return `アマトリカ診断で「${t.name || '?'}（${typeId}）」でした！\n${t.catch || ''}`;
}

function shareX() {
  const shareUrl = new URL('https://x.com/intent/tweet');
  shareUrl.searchParams.set('text', getShareText());
  shareUrl.searchParams.set('url', getShareUrl());
  shareUrl.searchParams.set('hashtags', 'アマトリカ診断,AIKNOW');

  window.open(
    shareUrl.toString(),
    '_blank',
    'width=550,height=420,noopener,noreferrer'
  );
}

function shareLine() {
  const url = new URL('https://social-plugins.line.me/lineit/share');
  url.searchParams.set('url', getShareUrl());
  url.searchParams.set('text', getShareText());
  window.open(url.toString(), '_blank', 'noopener');
}

function copyLink() {
  const url = getShareUrl();
  if (navigator.clipboard) {
    navigator.clipboard.writeText(url).then(() => showToast('リンクをコピーしました ✓'));
  } else {
    const ta = document.createElement('textarea');
    ta.value = url; ta.style.position = 'fixed'; ta.style.opacity = '0';
    document.body.appendChild(ta); ta.select();
    document.execCommand('copy');
    document.body.removeChild(ta);
    showToast('リンクをコピーしました ✓');
  }
}

// ── TOAST ─────────────────────────────────────────────────────
let toastTimer;
function showToast(msg) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => el.classList.remove('show'), 2200);
}

// ── RETRY ─────────────────────────────────────────────────────
function confirmRetry() {
  if (confirm('診断をやり直しますか？現在の結果はリセットされます。')) {
    try {
      localStorage.removeItem(STORAGE_RESULT);
      localStorage.removeItem('aiknow_amatrica_progress');
    } catch (e) {}
    window.location.href = 'quiz.html';
    return false;
  }
  return false;
}

// ── START ─────────────────────────────────────────────────────
init();
</script>
